<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write • BlogSpace</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:,">
    <meta name="description" content="Write a new story on BlogSpace">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <a href="index.html" class="logo">BlogSpace</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="stories.html">Stories</a>
                <a href="index.html#contact">Contact</a>
            </div>
            <div class="auth-buttons">
                <a href="#" class="btn btn-ghost">Sign In</a>
                <a href="write.html" class="btn btn-primary">Write</a>
            </div>
        </nav>
    </header>

    <main class="page-wrapper">
        <section class="page-hero">
            <div class="stars">
                <div class="star star-1"></div>
                <div class="star star-2"></div>
                <div class="star star-3"></div>
                <div class="star star-4"></div>
                <div class="star star-5"></div>
                <div class="star star-6"></div>
                <div class="star star-7"></div>
                <div class="star star-8"></div>
                <div class="star star-9"></div>
                <div class="star star-10"></div>
                <div class="star star-11"></div>
                <div class="star star-12"></div>
                <div class="star star-13"></div>
                <div class="star star-14"></div>
                <div class="star star-15"></div>
                <div class="star star-16"></div>
                <div class="star star-17"></div>
                <div class="star star-18"></div>
                <div class="star star-19"></div>
                <div class="star star-20"></div>
            </div>
            <div class="page-hero-content">
                <h1>Write a Story</h1>
                <p>Share your thoughts with the world</p>
            </div>
        </section>

        <section class="container section">
            <form class="blog-form" action="stories.html" method="get">
                <div class="form-row">
                    <div class="form-group">
                        <label for="title">Title</label>
                        <input id="title" name="title" type="text" placeholder="Give your story a title" required>
                    </div>
                    <div class="form-group">
                        <label for="icon">Icon (emoji)</label>
                        <input id="icon" name="icon" type="text" placeholder="e.g. ✍️ or 💡" maxlength="2">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input id="date" name="date" type="date">
                    </div>
                    <div class="form-group">
                        <label for="readtime">Read time (minutes)</label>
                        <input id="readtime" name="readtime" type="number" min="1" placeholder="5">
                    </div>
                </div>

                <div class="form-group">
                    <label for="content">Your Story</label>
                    <textarea id="content" name="content" rows="10" placeholder="Start writing here..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Publish</button>
                    <a href="stories.html" class="btn btn-ghost">Preview Stories</a>
                </div>
            </form>
        </section>
    </main>

    <footer class="contact" id="contact">
        <div class="container">
            <h2>Contacts</h2>
            <div class="contact-info">
                <div class="contact-item">
                    <a href="mailto:ks2838@srmist.edu.in">
                        <span>📧</span>
                        <span> G-MAIL</span>
                    </a>
                </div>
                <div class="contact-item">
                    <a href="https://www.instagram.com/_.kesh4v_/">
                        <span>📸</span>
                        <span>Instagram</span>
                    </a>
                </div>
                <div class="contact-item">
                    <a href="https://github.com/Keshav-k-Sharma">
                        <span>🐙</span>
                        <span>Github</span>
                    </a>
                </div>
                <div class="contact-item">
                    <a href="https://www.linkedin.com/in/keshav-k-sharma">
                        <span>💼</span>
                        <span>LinkedIn</span>
                    </a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
